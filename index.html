<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* §0 RESET & TOKENS */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
:root{
  --bg:#101012;--sf:#1a1a1f;--sf2:#242429;--bd:#2e2e36;
  --tx:#e8e8ec;--tx2:#8c8c9e;--ac:#f97316;--ac2:#fdba74;
  --grn:#34d399;--red:#f87171;--blu:#60a5fa;--pur:#c084fc;
  --mono:'IBM Plex Mono',monospace;--sans:'Outfit',system-ui,sans-serif;
}
html{background:var(--bg);color:var(--tx);font-family:var(--sans)}
body{padding:10px 14px 20px;max-width:1280px;margin:0 auto}
:where(button,input,textarea,select,[role="slider"]):focus-visible{outline:2px solid var(--blu);outline-offset:2px}

/* §1 HEADER */
.hdr{text-align:center;margin-bottom:8px}
.hdr h1{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ac)}

/* §2 URL BAR */
.url-bar{display:flex;gap:8px;margin-bottom:10px}
@media(min-width:1101px){.url-bar{margin-left:calc(240px + 12px);margin-right:calc(320px + 12px)}}
.url-wrap{flex:1;position:relative;display:flex;align-items:center}
.url-in{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:var(--mono);font-size:14px;padding:12px 34px 12px 12px;outline:none}
.url-in:focus{border-color:var(--ac)}
.url-in::placeholder{color:var(--tx2);opacity:1}
.url-clear{position:absolute;right:6px;background:none;border:none;color:var(--tx2);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:4px;line-height:1;display:none;-webkit-tap-highlight-color:transparent}
.url-clear:hover{color:var(--red)}
.url-clear.show{display:block}
.btn-bk-star{font-size:34px;padding:2px 16px;min-height:48px;min-width:54px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;line-height:1}
.btn-bk-star:hover:not(:disabled){color:#fbbf24;border-color:#fbbf24;background:#2a2a22}
.btn-bk-star:active:not(:disabled){transform:scale(.9);color:#fbbf24}
.btn-bk-star:disabled{opacity:.3;cursor:not-allowed}
.btn-bk-star.saved{color:#fbbf24;border-color:#fbbf24}
.btn-copy-url{min-width:82px}

/* §3 GRID */
.grid{display:grid;grid-template-columns:240px 1fr 320px;gap:12px;max-height:calc(100vh - 120px)}
@media(max-width:1100px){.grid{grid-template-columns:1fr;max-height:none}}
.stack{display:flex;flex-direction:column;gap:8px}
.col-scroll{overflow-y:auto;max-height:calc(100vh - 120px)}
@media(max-width:1100px){.col-scroll{max-height:none;overflow-y:visible}}

/* §4 CARD & BUTTON */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px 14px}
.card-t{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx);margin-bottom:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;border:1px solid var(--bd);border-radius:8px;background:var(--sf2);color:var(--tx);font-family:var(--sans);font-size:14px;font-weight:600;padding:12px 13px;cursor:pointer;user-select:none;white-space:nowrap;min-height:48px;transition:all .1s;-webkit-tap-highlight-color:transparent}
.btn:hover:not(:disabled){background:#32323e;border-color:var(--ac)}
.btn:active:not(:disabled){transform:scale(.96)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-a{background:var(--ac);border-color:var(--ac);color:#fff}
.btn-a:hover:not(:disabled){background:var(--ac2);border-color:var(--ac2);color:#000}
.btn-s{padding:9px 10px;font-size:13px;min-height:38px}
.row{display:flex;gap:5px;flex-wrap:wrap}
.rowc{justify-content:center}
#transport{flex-wrap:nowrap}

/* §5 EMBED */
#embed-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;margin-bottom:8px}
#embed-wrap iframe{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;border:none!important}
.embed-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx2);gap:4px;z-index:2}
.embed-ph b{font-size:40px;opacity:.35}
.embed-ph span{font-size:14px}
.vid-title{font-size:13px;color:var(--tx2);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* §6 SEEKBAR */
.seek-w{position:relative;height:32px;display:flex;align-items:center;margin-bottom:2px;cursor:pointer;touch-action:none}
.seek-w.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.seek-t{position:relative;width:100%;height:8px;background:var(--sf2);border-radius:4px}
.seek-f{position:absolute;left:0;top:0;height:100%;background:var(--ac);border-radius:4px;pointer-events:none}
.seek-ab{position:absolute;top:0;height:100%;background:rgba(192,132,252,.25);pointer-events:none}
.seek-mk{position:absolute;top:-4px;width:3px;height:16px;border-radius:1px;pointer-events:none}
.seek-ma{background:var(--grn)}.seek-mb{background:var(--red)}
.seek-th{position:absolute;top:50%;width:16px;height:16px;background:var(--ac);border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 6px rgba(249,115,22,.45);transition:left 0.05s linear}
.seek-flags{position:relative;width:100%;height:24px;margin-bottom:1px;touch-action:none}
.seek-flag{position:absolute;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:auto;cursor:grab;transition:left 0.05s linear;-webkit-tap-highlight-color:transparent}
.seek-flag:active{cursor:grabbing}
.seek-flag.dragging{cursor:grabbing;transition:none;z-index:5}
.seek-flag-pole{width:2px;height:8px;border-radius:1px}
.seek-flag-label{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;line-height:1.2;user-select:none}
.seek-flags.stacked{height:54px}
.seek-flags.stacked .seek-flag-b{top:24px}
.seek-flags.stacked .seek-flag-b::before{content:"";position:absolute;top:-24px;left:50%;width:2px;height:24px;transform:translateX(-50%);background:var(--red);border-radius:1px}
.seek-flag-a .seek-flag-pole{background:var(--grn)}
.seek-flag-a .seek-flag-label{background:rgba(52,211,153,.15);color:var(--grn);border:1px solid rgba(52,211,153,.35)}
.seek-flag-b .seek-flag-pole{background:var(--red)}
.seek-flag-b .seek-flag-label{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.time-r{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;color:var(--tx2);margin-bottom:6px}

/* §7 SPEED */
.sp-btn{flex:1;padding:10px 0;min-width:0;text-align:center;font-family:var(--mono);font-size:13px;font-weight:600;border-radius:6px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx2);cursor:pointer;transition:all .12s}
.sp-btn:hover{border-color:var(--ac);color:var(--tx)}
.sp-btn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.sp-btn:disabled{opacity:.3;cursor:not-allowed}
#speed-row{flex-wrap:nowrap}

/* §8 AB LOOP */
.ab-info{font-family:var(--mono);font-size:12px;color:var(--tx2);margin-top:5px}
.ab-info.on{color:var(--pur)}
.ab-warn{font-size:12px;color:var(--ac2);margin-top:4px}
.ab-adjust{display:grid;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.ab-adjust-row{display:grid;grid-template-columns:minmax(0,1fr) 64px 64px;align-items:center;gap:5px}
.ab-adjust-label{font-family:var(--mono);font-size:12px;font-weight:700}
.ab-adjust-label.a{color:var(--grn)}
.ab-adjust-label.b{color:var(--red)}
.ab-adjust-btn{min-height:36px;padding:7px 6px;font-family:var(--mono);font-size:12px}

/* §9 TAP BPM */
.tap-btn{width:100%;min-height:66px;font-size:22px;font-weight:700;font-family:var(--mono);border-radius:10px;background:var(--sf2);border:2px solid var(--bd);color:var(--tx);cursor:pointer;transition:all .08s;user-select:none;-webkit-tap-highlight-color:transparent}
.tap-btn:active{background:var(--ac);border-color:var(--ac);color:#fff;transform:scale(.97)}
.metronome-link{display:inline-flex;align-items:center;min-height:40px;margin:3px 0 0 -6px;padding:0 6px;border:0;border-radius:6px;background:transparent;color:var(--tx2);font-size:12px;font-weight:600;text-decoration:none;transition:background .12s,color .12s;-webkit-tap-highlight-color:transparent}
.metronome-link:hover{background:var(--sf2);color:var(--tx)}
.metronome-link:focus-visible{outline:2px solid var(--blu);outline-offset:2px}
.metronome-link:active{color:var(--ac)}

/* §10 COLLAPSIBLE PANELS */
.panel-header{display:flex;align-items:center;gap:6px;width:100%;background:none;border:0;color:inherit;text-align:left;font:inherit;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.panel-header:hover .panel-arrow{color:var(--ac)}
.panel-arrow{font-size:11px;color:var(--tx2);transition:transform .15s;width:14px;text-align:center}
.panel-arrow.open{transform:rotate(90deg)}
.panel-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.hl{display:flex;flex-direction:column;gap:3px;max-height:160px;overflow-y:auto;margin-top:6px}
.hi{display:flex;align-items:center;gap:6px;padding:8px 8px;background:var(--sf2);border-radius:5px;transition:background .1s}
.hi:hover{background:#32323e}
.hi-open{display:flex;align-items:center;flex:1;min-width:0;background:none;border:0;color:inherit;text-align:left;cursor:pointer}
.hi-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:11px;color:var(--tx2)}
.hi-d{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:14px;padding:1px 3px;border-radius:3px;line-height:1;flex-shrink:0}
.hi-d:hover{color:var(--red)}

/* §11 MESSAGES */
.msg-err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;color:var(--red);padding:8px 12px;font-size:13px;margin-bottom:10px}
.msg-info{background:rgba(96,165,250,.07);border:1px solid rgba(96,165,250,.2);border-radius:8px;color:var(--blu);padding:8px 12px;font-size:13px;margin-bottom:10px}
.msg-warn{background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.2);border-radius:8px;color:var(--ac2);padding:8px 12px;font-size:13px;margin-bottom:10px}
.msg-debug{display:none}
.rst-bar{display:flex;align-items:center;gap:8px}
.rst-bar span{flex:1}
.mode-badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-left:8px}
.mode-badge.iframe{background:rgba(249,115,22,.1);color:var(--ac2);border:1px solid rgba(249,115,22,.25)}

/* §12 SECTIONS */
.sec-form-row{display:flex;gap:6px;margin-bottom:6px}
.sec-input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:13px;padding:10px 9px;outline:none}
.sec-input:focus{border-color:var(--ac)}
.sec-input::placeholder{color:var(--tx2);opacity:1}
.sec-textarea{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:13px;padding:10px 9px;outline:none;resize:vertical;min-height:38px;max-height:80px}
.sec-textarea:focus{border-color:var(--ac)}
.sec-textarea::placeholder{color:var(--tx2);opacity:1}
.sec-select{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:13px;padding:6px 8px;outline:none;cursor:pointer}
.sec-select:focus{border-color:var(--ac)}

/* Section speed nudge buttons */
.sec-spd-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.sec-spd-label{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--tx2)}
.sec-spd-actions{display:flex;gap:4px}
.sec-spd-mode-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--tx2);font-family:var(--sans);font-size:10px;font-weight:600;padding:5px 7px;cursor:pointer;transition:all .1s}
.sec-spd-mode-btn:hover{border-color:var(--ac);color:var(--tx)}
.sec-spd-mode-btn.on{border-color:var(--ac);color:var(--ac);background:rgba(249,115,22,.08)}
.sec-spd-bar{display:flex;align-items:center;gap:3px;margin:5px 0 6px}
.sec-spd-nudge{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--tx2);font-family:var(--mono);font-size:11px;font-weight:600;padding:7px 8px;cursor:pointer;transition:all .1s;-webkit-tap-highlight-color:transparent;user-select:none}
.sec-spd-nudge:hover:not(:disabled){border-color:var(--ac);color:var(--tx)}
.sec-spd-nudge:active:not(:disabled){transform:scale(.95)}
.sec-spd-nudge:disabled{opacity:.3;cursor:not-allowed}
.sec-spd-display{display:block;flex:1;min-height:32px;line-height:32px;text-align:center;font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ac);user-select:none}
.sec-spd-display.none{color:var(--tx2);font-weight:400;font-size:13px}

.sec-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto}
.sec-item{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 10px;transition:all .12s}
.sec-item:hover{border-color:var(--pur);background:#2a2a32}
.sec-item-top{display:flex;align-items:flex-start;gap:5px}
.sec-item-load{display:flex;flex-direction:column;align-items:flex-start;gap:3px;flex:1;min-width:0;padding:2px 0;background:none;border:0;color:inherit;text-align:left;cursor:pointer}
.sec-item-label{width:100%;font-family:var(--mono);font-size:13px;font-weight:600;line-height:1.35;color:var(--tx);overflow-wrap:anywhere;white-space:normal}
.sec-item-time{font-family:var(--mono);font-size:12px;color:var(--pur);white-space:nowrap}
.sec-item-del{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:16px;padding:4px 5px;border-radius:3px;line-height:1;flex-shrink:0}
.sec-item-del:hover{color:var(--red)}
.sec-item-meta-row{display:flex;align-items:center;gap:7px;min-width:0;margin-top:7px}
.sec-item-meta{flex:1;min-width:0;font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-item-note{font-size:11px;color:var(--ac2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}

/* v3: Status badge */
.sec-status{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 7px;border-radius:4px;cursor:pointer;user-select:none;flex-shrink:0;line-height:1.2;border:1px solid transparent}
.sec-status:disabled{opacity:.5;cursor:not-allowed}
.sec-status-todo{background:var(--sf);color:var(--tx2);border-color:var(--bd)}
.sec-status-working{background:rgba(249,115,22,.12);color:var(--ac);border-color:rgba(249,115,22,.3)}
.sec-status-done{background:rgba(52,211,153,.1);color:var(--grn);border-color:rgba(52,211,153,.25)}

/* v3: Edit button */
.sec-item-edit{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:14px;padding:4px 5px;border-radius:3px;line-height:1;flex-shrink:0}
.sec-item-edit:hover{color:var(--blu)}

/* v3: Inline edit form */
.sec-edit-form{margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)}
.sec-edit-row{display:flex;gap:4px;margin-bottom:4px}
.sec-edit-input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-family:var(--mono);font-size:11px;padding:5px 7px;outline:none}
.sec-edit-input:focus{border-color:var(--ac)}
.sec-edit-select{background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-family:var(--mono);font-size:11px;padding:4px 6px;outline:none;cursor:pointer}

/* §13 BOOKMARKS */
.bk-input{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:13px;padding:10px 9px;outline:none}
.bk-input:focus{border-color:var(--ac)}
.bk-input::placeholder{color:var(--tx2);opacity:1}
.bk-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto}
.bk-folder-head{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;user-select:none;transition:background .1s}
.bk-folder-head:hover{background:#2e2e38}
.bk-folder-toggle{display:flex;align-items:center;gap:6px;flex:1;min-width:0;background:none;border:0;color:inherit;text-align:left;cursor:pointer}
.bk-folder-icon{font-size:13px;width:16px;text-align:center;transition:transform .15s}
.bk-folder-icon.open{transform:rotate(90deg)}
.bk-folder-name{flex:1;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--tx)}
.bk-folder-cnt{font-family:var(--mono);font-size:11px;color:var(--tx2)}
.bk-folder-del{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:13px;padding:1px 3px;border-radius:3px;line-height:1}
.bk-folder-del:hover{color:var(--red)}
.bk-folder-items{padding-left:10px;display:flex;flex-direction:column;gap:3px;margin-top:3px}
.bk-item{display:flex;align-items:center;gap:6px;padding:9px 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;transition:all .1s}
.bk-item:hover{border-color:var(--ac);background:#2a2a32}
.bk-item-load{display:block;flex:1;min-width:0;background:none;border:0;color:inherit;text-align:left;cursor:pointer}
.bk-item-body{flex:1;min-width:0}
.bk-item-title{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-item-meta{font-size:11px;color:var(--tx2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-item-note{font-size:11px;color:var(--ac2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.bk-item-del{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:14px;padding:1px 3px;border-radius:3px;line-height:1;flex-shrink:0}

<script>
/* ============================================================
   §0  UTILITIES
   ============================================================ */
function parseTimeValue(value){
  if(value==null)return 0;
  var s=String(value).trim().toLowerCase();
  if(!s)return 0;
  if(/^\d+(?:\.\d+)?s?$/.test(s))return Math.max(0,parseFloat(s));
  if(/^\d+:\d{1,2}(?::\d{1,2})?$/.test(s)){
    var parts=s.split(':').map(Number),total=0;
    for(var i=0;i<parts.length;i++)total=total*60+parts[i];
    return Math.max(0,total);
  }
  var match=s.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+(?:\.\d+)?)s)?$/);
  if(!match||(match[1]==null&&match[2]==null&&match[3]==null))return 0;
  return Math.max(0,(Number(match[1])||0)*3600+(Number(match[2])||0)*60+(Number(match[3])||0));
}
function extractVideoSource(input){
  if(!input||typeof input!=='string')return null;
  var s=input.trim();
  if(/^[A-Za-z0-9_-]{11}$/.test(s))return{id:s,start:0};
  try{
    var u=new URL(s),h=u.hostname.toLowerCase().replace(/^www\./,''),id=null;
    if(['youtube.com','m.youtube.com','music.youtube.com','youtube-nocookie.com'].indexOf(h)!==-1){
      if(u.searchParams.has('v'))id=u.searchParams.get('v');
      var seg=u.pathname.split('/').filter(Boolean);
      if(!id&&['shorts','embed','live'].indexOf(seg[0])!==-1&&seg[1])id=seg[1];
    }
    if(h==='youtu.be'){var p=u.pathname.slice(1);if(p)id=p.split('/')[0];}
    if(!/^[A-Za-z0-9_-]{11}$/.test(id||''))return null;
    var timeRaw=u.searchParams.get('t')||u.searchParams.get('start')||u.searchParams.get('time_continue');
    if(!timeRaw&&u.hash)timeRaw=new URLSearchParams(u.hash.slice(1)).get('t');
    return{id:id,start:parseTimeValue(timeRaw)};
  }catch(e){}
  return null;
}
function extractVideoId(input){var source=extractVideoSource(input);return source?source.id:null;}
function fmt(sec){
  if(sec==null||isNaN(sec)||sec<0)return'0:00';
  var m=Math.floor(sec/60),s=Math.floor(sec%60);
  return m+':'+(s<10?'0':'')+s;
}
function fmtTenths(sec){
  if(sec==null||isNaN(sec)||sec<0)return'0:00.0';
  var total=Math.round(sec*10),m=Math.floor(total/600),rest=total-m*600,s=Math.floor(rest/10),t=rest%10;
  return m+':'+(s<10?'0':'')+s+'.'+t;
}
function compactNumber(value){return String(Math.round(Number(value)*100)/100);}
function generateId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
/** 速度値を丸めた整数(×100)で返す。null→null。比較用共通関数。 */
function normSpd(v){return v!=null?Math.round(v*100):null;}

/* §2 STATE */

/* §3 DOM REFS */

/* §4 MESSAGES */
var infoTimer=null,warnTimer=null;
function showError(m){$err.textContent=m;$err.style.display='block';}
function clearError(){$err.textContent='';$err.style.display='none';}
function showInfo(m){clearTimeout(infoTimer);$info.textContent=m;$info.style.display='block';infoTimer=setTimeout(clearInfo,6000);}
function clearInfo(){clearTimeout(infoTimer);infoTimer=null;$info.textContent='';$info.style.display='none';}
function showWarn(m){clearTimeout(warnTimer);$warn.textContent=m;$warn.style.display='block';warnTimer=setTimeout(clearWarn,5000);}
function clearWarn(){clearTimeout(warnTimer);warnTimer=null;$warn.textContent='';$warn.style.display='none';}
function debugLog(m){console.log('[YTP]',m);$debug.textContent=m;}
function clearAllMessages(){clearError();clearInfo();clearWarn();}
function clearLoadMessages(){clearAllMessages();}

/* §4b SELF-TESTS */
(function(){
  var f=[];
  function eq(a,b,l){if(a!==b)f.push(l);}
  eq(extractVideoId('dQw4w9WgXcQ'),'dQw4w9WgXcQ','raw');
  eq(extractVideoId('https://www.youtube.com/watch?v=dQw4w9WgXcQ'),'dQw4w9WgXcQ','watch');
  eq(extractVideoId('https://youtu.be/dQw4w9WgXcQ'),'dQw4w9WgXcQ','short');
  eq(extractVideoSource('https://youtu.be/dQw4w9WgXcQ?t=1m23s').start,83,'timestamp');
  eq(extractVideoSource('https://music.youtube.com/watch?v=dQw4w9WgXcQ&start=45').start,45,'music-start');
  eq(extractVideoId('https://youtube.com/watch?v=short'),null,'invalid-id');
  eq(extractVideoId('not-a-url'),null,'invalid');
  eq(fmt(0),'0:00','f0');eq(fmt(65),'1:05','f65');
  eq(fmtTenths(65.06),'1:05.1','f-tenth');

var SECTION_DUPE_TOLERANCE=0.5;
var STATUS_LIST=['todo','working','done'];
var STATUS_LABELS={todo:'未着手',working:'練習中',done:'完了'};

/* 区間保存の速度 — null=なし対応、初期値=現在の再生速度 */
var secSpdValue=null; // null=なし, number=指定あり

}

}

}

/**
 * 区間重複判定 — pointA/pointB + speedPreset の3条件で判定する。
 * 同じ区間でも速度が異なれば「別の練習条件」として別保存できる。
 * speedPreset が null 同士の場合も重複とみなす。
 */
function isDuplicateSection(a,b,spd){
  var secs=getSections();
  for(var i=0;i<secs.length;i++){
    var s=secs[i];
    if(Math.abs(s.pointA-a)<SECTION_DUPE_TOLERANCE&&Math.abs(s.pointB-b)<SECTION_DUPE_TOLERANCE){
      // 速度も一致（両方null、または丸め後の値が同じ）なら重複
      var spdA=normSpd(s.speedPreset);
      var spdB=normSpd(spd);
      if(spdA===spdB)return true;
    }
  }
  return false;
}

/** 区間保存 — speedPreset と status:'todo' を含む */
function saveSection(){
  if(!canEnableLoop()||!currentVideoId)return;
  var spdVal=$('sec-speed-preset').value;
  var parsedSpd=spdVal?parseFloat(spdVal):null;
  if(isDuplicateSection(pointA,pointB,parsedSpd)){showWarn('同じ区間と速度で保存済みです');return;}clearWarn();
  var label=$('sec-label').value.trim();
  var note=$('sec-note').value.trim();
  if(!label)label=fmtTenths(pointA)+' → '+fmtTenths(pointB);
  var section={
    id:generateId(),
    label:label,
    pointA:pointA,
    pointB:pointB,
    note:note,
    speedPreset:parsedSpd,
    status:'todo',  // v3: 初期ステータス
    createdAt:Date.now()
  };
  if(!allSections[currentVideoId])allSections[currentVideoId]=[];
  allSections[currentVideoId].unshift(section);
  saveSectionsStore();renderSections();clearSectionForm();
  debugLog('区間保存: '+label);
}

/** 区間読込 — 状態適用順: A/B → 指定速度 → loop → UI → seek → saveSession */
function loadSection(sec){
  // 1. A/B設定
  pointA=sec.pointA;pointB=sec.pointB;
  // 2. 速度指定がある場合だけ適用。指定なしは現在速度を維持する
  if(sec.speedPreset!=null)changeSpeed(sec.speedPreset,{skipSave:true});
  // 3. ループ判定
  var secValid=sec.pointA!=null&&sec.pointB!=null&&sec.pointB>sec.pointA&&sec.pointB-sec.pointA>=AB_MIN_INTERVAL;
  loopActive=secValid;
  // 4. UI更新
  updateABUI();
  // 5. シーク
  if(controlMode==='api'&&player&&playerReady){try{player.seekTo(sec.pointA,true);currentTime=sec.pointA;updateSeekbar();}catch(e){}}
  // 6. 最終状態確定後にセッション保存
  saveSession();debugLog('区間読込: '+sec.label);
}

function deleteSection(secId){
  if(!currentVideoId||!allSections[currentVideoId])return;
  var target=allSections[currentVideoId].find(function(s){return s.id===secId;});
  if(!target)return;
  if(!confirm('「'+target.label+'」を削除しますか？'))return;
  allSections[currentVideoId]=allSections[currentVideoId].filter(function(s){return s.id!==secId;});
  if(allSections[currentVideoId].length===0)delete allSections[currentVideoId];
  saveSectionsStore();renderSections();
  debugLog('区間削除: '+target.label);
}

/** v3: ステータス循環切替 (todo→working→done→todo) */
function cycleSectionStatus(secId){
  if(!currentVideoId||!allSections[currentVideoId])return;
  allSections[currentVideoId].forEach(function(s){
    if(s.id===secId){
      var idx=STATUS_LIST.indexOf(s.status||'todo');
      s.status=STATUS_LIST[(idx+1)%STATUS_LIST.length];
    }
  });
  saveSectionsStore();renderSections();
}

/** v3: セクションデータを更新 */
function updateSectionData(secId,updates){
  if(!currentVideoId||!allSections[currentVideoId])return;
  allSections[currentVideoId].forEach(function(s){
    if(s.id===secId){
      if(updates.label!==undefined)s.label=updates.label;
      if(updates.note!==undefined)s.note=updates.note;
      if(updates.speedPreset!==undefined)s.speedPreset=updates.speedPreset;
      if(updates.status!==undefined)s.status=updates.status;
    }
  });
  saveSectionsStore();
}

/** v3: 編集開始 */
function startEditSection(secId){editingSectionId=secId;renderSections();}

/** v3: 編集保存 */
function saveEditSection(secId){
  var lbl=$('edit-label-'+secId);
  var note=$('edit-note-'+secId);
  var spd=$('edit-speed-'+secId);
  if(lbl&&note&&spd){
    updateSectionData(secId,{
      label:lbl.value.trim()||'(無題)',
      note:note.value.trim(),
      speedPreset:spd.value?parseFloat(spd.value):null
    });
  }
  editingSectionId=null;renderSections();
}

/** v3: 編集キャンセル */
function cancelEditSection(){editingSectionId=null;renderSections();}

/** セクション一覧レンダリング（v3: status + edit 対応） */

    var isEditing=editingSectionId===s.id;

    // --- Top row: label + time + edit + delete ---

    var st=s.status||'todo';
    var badge=document.createElement('button');badge.type='button';
    badge.className='sec-status sec-status-'+st;
    badge.textContent=STATUS_LABELS[st]||st;

    badge.title='押すと切替: 未着手 → 練習中 → 完了';
    badge.setAttribute('aria-label','ステータス: '+(STATUS_LABELS[st]||st)+'。押すと次へ切り替え');
    badge.onclick=function(e){e.stopPropagation();cycleSectionStatus(s.id);};

    var speedDesc=s.speedPreset!=null?s.speedPreset+'倍へ変更':'速度は変更しない';
    var loadBtn=document.createElement('button');loadBtn.type='button';loadBtn.className='sec-item-load';loadBtn.disabled=isEditing;
    loadBtn.setAttribute('aria-label','区間を読み込む: '+s.label+'、'+fmtTenths(s.pointA)+'から'+fmtTenths(s.pointB)+'、'+speedDesc);
    loadBtn.onclick=function(e){e.stopPropagation();loadSection(s);};
    var lbl=document.createElement('div');lbl.className='sec-item-label';lbl.textContent=s.label;
    loadBtn.appendChild(lbl);

    var time=document.createElement('div');time.className='sec-item-time';
    time.textContent=fmtTenths(s.pointA)+' → '+fmtTenths(s.pointB);
    loadBtn.appendChild(time);top.appendChild(loadBtn);

    // Edit button
    var editBtn=document.createElement('button');editBtn.type='button';editBtn.className='sec-item-edit';
    editBtn.textContent='✎';editBtn.title='編集';editBtn.setAttribute('aria-label','区間を編集: '+s.label);
    editBtn.onclick=function(e){e.stopPropagation();startEditSection(s.id);};
    top.appendChild(editBtn);

    var del=document.createElement('button');del.type='button';del.className='sec-item-del';del.textContent='✕';del.setAttribute('aria-label','区間を削除: '+s.label);
    del.onclick=function(e){e.stopPropagation();deleteSection(s.id);};
    top.appendChild(del);

    item.appendChild(top);

    // --- Bottom row: status + speed ---
    var metaRow=document.createElement('div');metaRow.className='sec-item-meta-row';metaRow.appendChild(badge);
    if(!isEditing){
      var meta=document.createElement('div');meta.className='sec-item-meta';
      meta.textContent=s.speedPreset!=null?'読み込み時: '+s.speedPreset+'x':'読み込み時: 速度を変更しない';metaRow.appendChild(meta);
    }
    item.appendChild(metaRow);

    // --- Note ---
    if(s.note&&!isEditing){
      var note=document.createElement('div');note.className='sec-item-note';
      note.textContent='📝 '+s.note;note.title=s.note;item.appendChild(note);
    }

    // --- v3: Inline edit form ---
    if(isEditing){
      var form=document.createElement('div');form.className='sec-edit-form';

      var r1=document.createElement('div');r1.className='sec-edit-row';
      var eLbl=document.createElement('input');eLbl.type='text';eLbl.className='sec-edit-input';eLbl.id='edit-label-'+s.id;eLbl.value=s.label;eLbl.placeholder='区間名';eLbl.maxLength=40;
      // v3fix: 編集の速度選択肢 — 0.25〜2.00の0.05刻み

      var eSpdOpt=document.createElement('option');eSpdOpt.value='';eSpdOpt.textContent='速度を変更しない';eSpd.appendChild(eSpdOpt);
      for(var sv=0.25;sv<=2.005;sv+=0.05){var rv=Math.round(sv*100)/100;var eo=document.createElement('option');eo.value=String(rv);eo.textContent=rv+'x';eSpd.appendChild(eo);}
      eSpd.value=s.speedPreset!=null?String(s.speedPreset):'';

/* §17b BOOKMARKS */
function saveBookmarksStore(){try{localStorage.setItem('ytp_bookmarks',JSON.stringify(bookmarkData));}catch(e){}}
function updateBookmarkSaveButton(){
  var canSave=!!currentVideoId&&controlMode!=='none';
  var btn=$('btn-bk-quick');if(!btn)return;
  btn.disabled=!canSave;
  // ★ saved判定: 重複チェックと同じ条件で「今の状態がBK済みか」を判定
  var BK_POS_TOL=0.5;
  var curSpdN=normSpd(speed);
  var isSaved=canSave&&bookmarkData.items.some(function(b){
    if(b.videoId!==currentVideoId||normSpd(b.speed)!==curSpdN||b.loopActive!==loopActive)return false;
    var aM=(b.pointA==null&&pointA==null)||(b.pointA!=null&&pointA!=null&&Math.abs(b.pointA-pointA)<BK_POS_TOL);
    var bM=(b.pointB==null&&pointB==null)||(b.pointB!=null&&pointB!=null&&Math.abs(b.pointB-pointB)<BK_POS_TOL);
    return aM&&bM;
  });
  btn.classList.toggle('saved',isSaved);
}
function quickBookmark(){
  if(!currentVideoId)return;
  var BK_POS_TOL=0.5;
  var curSpdN=normSpd(speed);
  var isDupe=bookmarkData.items.some(function(b){
    if(b.videoId!==currentVideoId)return false;
    if(normSpd(b.speed)!==curSpdN)return false;
    if(b.loopActive!==loopActive)return false;
    var aMatch=(b.pointA==null&&pointA==null)||(b.pointA!=null&&pointA!=null&&Math.abs(b.pointA-pointA)<BK_POS_TOL);
    var bMatch=(b.pointB==null&&pointB==null)||(b.pointB!=null&&pointB!=null&&Math.abs(b.pointB-pointB)<BK_POS_TOL);
    return aMatch&&bMatch;
  });
  if(isDupe){showInfo('同じ状態のブックマークがあります');return;}clearInfo();
  var name='';var t=$title.textContent;if(t)name=t.replace('🎵 ','');if(!name)name=currentUrl||currentVideoId;
  bookmarkData.items.unshift({id:generateId(),folderId:null,videoId:currentVideoId,url:currentUrl,title:name,speed:speed,pointA:pointA,pointB:pointB,loopActive:loopActive,note:'',createdAt:Date.now()});
  saveBookmarksStore();renderBookmarks();updateBookmarkSaveButton();debugLog('★ BK追加: '+name);
}
function loadBookmark(bk){$urlIn.value=bk.url;loadVideoByUrl(bk.url);var att=0;var ri=setInterval(function(){att++;if(att>40){clearInterval(ri);return;}if(controlMode==='api'&&playerReady&&player){if(bk.speed!=null)changeSpeed(bk.speed,{skipSave:true});if(bk.pointA!=null)pointA=bk.pointA;if(bk.pointB!=null)pointB=bk.pointB;if(bk.loopActive&&canEnableLoop())loopActive=true;updateABUI();if(bk.pointA!=null){try{player.seekTo(bk.pointA,true);currentTime=bk.pointA;updateSeekbar();}catch(e){}}saveSession();clearInterval(ri);}else if(controlMode==='iframe'){clearInterval(ri);}},300);}
function deleteBookmark(id){bookmarkData.items=bookmarkData.items.filter(function(b){return b.id!==id;});saveBookmarksStore();renderBookmarks();updateBookmarkSaveButton();}
function moveBookmarkToFolder(bkId,fid){bookmarkData.items.forEach(function(b){if(b.id===bkId)b.folderId=fid||null;});saveBookmarksStore();renderBookmarks();}
function addBookmarkFolder(){var name=$('bk-new-folder').value.trim();if(!name)return;if(bookmarkData.folders.some(function(f){return f.name===name;})){showWarn('同じ名前のフォルダがあります');return;}clearWarn();bookmarkData.folders.push({id:generateId(),name:name});saveBookmarksStore();renderBookmarks();$('bk-new-folder').value='';}
function deleteBookmarkFolder(fid){bookmarkData.items.forEach(function(b){if(b.folderId===fid)b.folderId=null;});bookmarkData.folders=bookmarkData.folders.filter(function(f){return f.id!==fid;});delete openFolders[fid];saveBookmarksStore();renderBookmarks();}
function toggleBookmarkFolder(fid){openFolders[fid]=!openFolders[fid];renderBookmarks();}
function createFolderMoveSelect(bk){var sel=document.createElement('select');sel.className='bk-item-move';sel.setAttribute('aria-label','移動先フォルダ: '+bk.title);var o0=document.createElement('option');o0.value='';o0.textContent='未分類';sel.appendChild(o0);bookmarkData.folders.forEach(function(f){var o=document.createElement('option');o.value=f.id;o.textContent=f.name;sel.appendChild(o);});sel.value=bk.folderId||'';sel.onchange=function(){moveBookmarkToFolder(bk.id,sel.value);};return sel;}
function createBookmarkItemEl(bk){
  var item=document.createElement('div');item.className='bk-item';
  var body=document.createElement('button');body.type='button';body.className='bk-item-load';body.setAttribute('aria-label','ブックマークを読み込む: '+bk.title);body.onclick=function(){loadBookmark(bk);};
  var t=document.createElement('div');t.className='bk-item-title';t.textContent=bk.title;
  var m=document.createElement('div');m.className='bk-item-meta';var p=[];if(bk.speed&&bk.speed!==1)p.push(bk.speed+'x');if(bk.pointA!=null&&bk.pointB!=null)p.push(fmtTenths(bk.pointA)+'→'+fmtTenths(bk.pointB));m.textContent=p.join(' ')||bk.videoId;
  body.appendChild(t);body.appendChild(m);
  var act=document.createElement('div');act.className='bk-item-actions';if(bookmarkData.folders.length>0)act.appendChild(createFolderMoveSelect(bk));
  var del=document.createElement('button');del.type='button';del.className='bk-item-del';del.textContent='✕';del.setAttribute('aria-label','ブックマークを削除: '+bk.title);del.onclick=function(){deleteBookmark(bk.id);};
  act.appendChild(del);item.appendChild(body);item.appendChild(act);return item;
}
function renderBookmarks(){
  var $l=$('bk-list'),items=bookmarkData.items,folders=bookmarkData.folders;var $cnt=$('bk-count');if($cnt)$cnt.textContent=items.length?items.length+'件':'';
  if(!items.length&&!folders.length){$l.innerHTML='<div class="empty-state"><div class="empty-state-text">ブックマークなし</div></div>';return;}
  $l.innerHTML='';
  folders.forEach(function(folder){
    var fi=items.filter(function(b){return b.folderId===folder.id;});var isOpen=!!openFolders[folder.id];var contentId='bk-folder-items-'+folder.id;
    var head=document.createElement('div');head.className='bk-folder-head';
    var toggle=document.createElement('button');toggle.type='button';toggle.className='bk-folder-toggle';toggle.setAttribute('aria-expanded',String(isOpen));toggle.setAttribute('aria-controls',contentId);toggle.setAttribute('aria-label',(isOpen?'閉じる: ':'開く: ')+folder.name);toggle.onclick=function(){toggleBookmarkFolder(folder.id);};
    var icon=document.createElement('span');icon.className='bk-folder-icon'+(isOpen?' open':'');icon.textContent='▶';icon.setAttribute('aria-hidden','true');
    var fn=document.createElement('span');fn.className='bk-folder-name';fn.textContent='📁 '+folder.name;
    var cnt=document.createElement('span');cnt.className='bk-folder-cnt';cnt.textContent=fi.length;
    toggle.appendChild(icon);toggle.appendChild(fn);toggle.appendChild(cnt);
    var fdel=document.createElement('button');fdel.type='button';fdel.className='bk-folder-del';fdel.textContent='✕';fdel.setAttribute('aria-label','フォルダを削除: '+folder.name);fdel.onclick=function(){deleteBookmarkFolder(folder.id);};
    head.appendChild(toggle);head.appendChild(fdel);$l.appendChild(head);
    var c=document.createElement('div');c.className='bk-folder-items';c.id=contentId;c.hidden=!isOpen;fi.forEach(function(bk){c.appendChild(createBookmarkItemEl(bk));});$l.appendChild(c);
  });
  var uf=items.filter(function(b){return!b.folderId;});
  if(uf.length){if(folders.length){var uh=document.createElement('div');uh.style.cssText='font-family:var(--mono);font-size:11px;color:var(--tx2);margin-top:6px;margin-bottom:3px';uh.textContent='未分類';$l.appendChild(uh);}uf.forEach(function(bk){$l.appendChild(createBookmarkItemEl(bk));});}
}
renderBookmarks();

/* §18 KEYBOARD */
function isTextEntryKeyTarget(el){return !!(el&&el.closest&&el.closest('input,textarea,select,[contenteditable="true"]'));}
function targetOwnsShortcut(el,code){
  if(!el||!el.closest)return false;
  var control=el.closest('button,a,[role="button"],[role="slider"]');
  return !!(control&&(control.getAttribute('role')==='slider'||code==='Space'));
}
function getGlobalShortcut(e){
  if(e.defaultPrevented||e.isComposing||e.keyCode===229||e.metaKey||e.ctrlKey||e.altKey||e.shiftKey||isTextEntryKeyTarget(e.target)||targetOwnsShortcut(e.target,e.code))return null;
  switch(e.code){case'Space':return'play';case'ArrowLeft':return'back';case'ArrowRight':return'forward';case'KeyA':return'a';case'KeyB':return'b';case'KeyL':return'loop';default:return null;}
}
function isRepeatableShortcut(action){return action==='back'||action==='forward';}
document.addEventListener('keydown',function(e){
  var action=getGlobalShortcut(e);if(!action||controlMode!=='api'||!playerReady)return;
  if(e.repeat&&!isRepeatableShortcut(action))return;
  e.preventDefault();
  switch(action){case'play':togglePlay();break;case'back':seekBy(-5);break;case'forward':seekBy(5);break;case'a':setPointA();break;case'b':setPointB();break;case'loop':toggleLoop();break;}
});
$urlIn.addEventListener('keydown',function(e){if(e.key==='Enter')handleLoadClick();});
$urlIn.addEventListener('input',updateUrlClearBtn);

/* §19 INIT */
if('serviceWorker'in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./service-worker.js').catch(function(e){console.warn('Service Worker registration failed',e);});
  });
}
debugLog('起動完了 — URLを貼り付けて再生');
</script>
